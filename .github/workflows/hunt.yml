name: 🇧🇩 BD Live Threat Map — Collect & Deploy

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests feedparser

      - name: Run Real Bangladesh Threat Hunter
        env:
          OTX_API_KEY:      ${{ secrets.OTX_API_KEY }}
          DISCORD_WEBHOOK:  ${{ secrets.DISCORD_WEBHOOK }}
          IPINFO_KEY:       ${{ secrets.IPINFO_KEY }}
        run: python3 collect_threats.py

      - name: Commit & Push To Base (No-Conflict Mode)
        run: |
          git config user.name  "BD Threat Bot"
          git config user.email "bot@bd-threat-map.local"
          
          git fetch origin main
          git add docs/live_threats.json
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: real-threat alert update $(date -u +'%Y-%m-%d %H:%M')"
            git pull origin main --rebase -X theirs
            git push origin main
          else
            echo "No new unique attacks to commit in this cycle."
          fi
