- name: Commit & Push To Base (No-Conflict Mode)
        run: |
          git config user.name  "BD Threat Bot"
          git config user.email "bot@bd-threat-map.local"
          
          # রিমোট ব্রাঞ্চ থেকে লেটেস্ট কোড ট্র্যাক করা
          git fetch origin main
          git add docs/live_threats.json
          
          # যদি ফাইলে পরিবর্তন থাকে, তবেই কেবল প্রসেস করবে
          if ! git diff --staged --quiet; then
            git commit -m "chore: advanced real-threat alert update $(date -u +'%Y-%m-%d %H:%M')"
            
            # রিমোট পরিবর্তনের সাথে লোকাল পরিবর্তন পুশ করার আগে রিবেস করা
            git pull origin main --rebase -X theirs
            
            git push origin main
          else
            echo "No new unique attacks to commit in this cycle."
          fi
